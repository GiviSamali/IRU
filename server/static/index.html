<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>IRU управление ПК</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; padding: 16px; max-width: 800px; margin: 0 auto; }
    h2 { margin-top: 0; }
    label { display: block; margin-top: 8px; }
    input, select { width: 100%; padding: 6px; margin-top: 4px; box-sizing: border-box; }
    button { margin-top: 8px; padding: 8px 12px; cursor: pointer; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .row button { flex: 1 1 auto; }
    pre { background: #f4f4f4; padding: 8px; white-space: pre-wrap; margin-top: 12px; }
    .params-block { margin-top: 8px; border: 1px solid #ddd; padding: 8px; border-radius: 4px; }
    #download_link { margin-top: 8px; display: none; }
    #dir_view { margin-top: 12px; border: 1px solid #ddd; padding: 8px; border-radius: 4px; }
    #dir_view h4 { margin: 0 0 4px 0; }
    #dir_view ul { padding-left: 18px; margin: 4px 0; }
  </style>
</head>
<body>
  <h2>IRU управление ПК</h2>

  <label>
    Device ID
    <input id="device_id" value="PC_HOME">
  </label>

  <label>
    Action
    <select id="action" onchange="onActionChange()">
      <option value="open_app">open_app</option>
      <option value="find_file">find_file</option>
      <option value="list_dir">list_dir</option>
      <option value="open_path">open_path</option>
      <option value="download_file">download_file</option>
    </select>
  </label>

  <!-- Параметры для open_app -->
  <div id="params_open_app" class="params-block">
    <label>
      App name
      <input id="open_app_name" value="Steam">
    </label>
  </div>

  <!-- Параметры для find_file -->
  <div id="params_find_file" class="params-block" style="display:none;">
    <label>
      Name part
      <input id="find_file_name_part" value=".pdf">
    </label>
    <label>
      Max results
      <input id="find_file_max_results" type="number" value="10">
    </label>
    <label>
      Base path (опционально)
      <input id="find_file_base" placeholder="пусто = Desktop по умолчанию">
    </label>
  </div>

  <!-- Параметры для list_dir -->
  <div id="params_list_dir" class="params-block" style="display:none;">
    <label>
      Directory path (опционально)
      <input id="list_dir_path" placeholder="пусто = Desktop по умолчанию">
    </label>
  </div>

  <!-- Параметры для open_path -->
  <div id="params_open_path" class="params-block" style="display:none;">
    <label>
      Path to open
      <input id="open_path_path" placeholder="C:\Users\russa\OneDrive\Desktop">
    </label>
  </div>

  <!-- Параметры для download_file -->
  <div id="params_download_file" class="params-block" style="display:none;">
    <label>
      File path
      <input id="download_file_path" value="C:\Users\russa\OneDrive\Desktop\01236.pdf">
    </label>
  </div>

  <div class="row">
    <button onclick="presetOpenSteam()">Открыть Steam</button>
    <button onclick="presetFindPdf()">Найти PDF на рабочем столе</button>
    <button onclick="presetListDesktop()">Показать Desktop (list_dir)</button>
    <button onclick="presetDownloadFile()">Скачать файл (получить ссылку)</button>
  </div>

  <button onclick="sendCommand()">Отправить</button>

  <a id="download_link" href="#" target="_blank">Скачать файл по токену</a>

  <div id="dir_view" style="display:none;">
    <h4>Содержимое директории</h4>
    <div id="dir_path"></div>
    <div style="display:flex; gap:16px; flex-wrap:wrap;">
      <div>
        <strong>Папки:</strong>
        <ul id="dir_dirs"></ul>
      </div>
      <div>
        <strong>Файлы:</strong>
        <ul id="dir_files"></ul>
      </div>
    </div>
  </div>

  <h3>Ответ (raw JSON):</h3>
  <pre id="output"></pre>

  <script>
    function onActionChange() {
      const action = document.getElementById('action').value;

      document.getElementById('params_open_app').style.display =
        action === 'open_app' ? 'block' : 'none';
      document.getElementById('params_find_file').style.display =
        action === 'find_file' ? 'block' : 'none';
      document.getElementById('params_list_dir').style.display =
        action === 'list_dir' ? 'block' : 'none';
      document.getElementById('params_open_path').style.display =
        action === 'open_path' ? 'block' : 'none';
      document.getElementById('params_download_file').style.display =
        action === 'download_file' ? 'block' : 'none';

      hideDownloadLink();
      hideDirView();
    }

    function buildParams(action) {
      if (action === 'open_app') {
        return { name: document.getElementById('open_app_name').value };
      }
      if (action === 'find_file') {
        const namePart = document.getElementById('find_file_name_part').value;
        const maxResults = parseInt(document.getElementById('find_file_max_results').value || '10', 10);
        const base = document.getElementById('find_file_base').value.trim();
        const params = { name_part: namePart, max_results: maxResults };
        if (base) params.base = base;
        return params;
      }
      if (action === 'list_dir') {
        const path = document.getElementById('list_dir_path').value.trim();
        const params = {};
        if (path) params.path = path;
        return params;
      }
      if (action === 'open_path') {
        return { path: document.getElementById('open_path_path').value };
      }
      if (action === 'download_file') {
        return { path: document.getElementById('download_file_path').value };
      }
      return {};
    }

    function presetOpenSteam() {
      document.getElementById('action').value = 'open_app';
      document.getElementById('open_app_name').value = 'Steam';
      onActionChange();
    }

    function presetFindPdf() {
      document.getElementById('action').value = 'find_file';
      document.getElementById('find_file_name_part').value = '.pdf';
      document.getElementById('find_file_max_results').value = '10';
      document.getElementById('find_file_base').value = '';
      onActionChange();
    }

    function presetListDesktop() {
      document.getElementById('action').value = 'list_dir';
      document.getElementById('list_dir_path').value = '';
      onActionChange();
    }

    function presetDownloadFile() {
      document.getElementById('action').value = 'download_file';
      onActionChange();
    }

    function hideDownloadLink() {
      const link = document.getElementById('download_link');
      link.style.display = 'none';
      link.href = '#';
    }

    function hideDirView() {
      document.getElementById('dir_view').style.display = 'none';
      document.getElementById('dir_dirs').innerHTML = '';
      document.getElementById('dir_files').innerHTML = '';
      document.getElementById('dir_path').textContent = '';
    }

    function tryShowDownloadLink(respJson) {
      try {
        if (!respJson || respJson.status !== 'ok') return;
        const inner = respJson.result;
        if (!inner || inner.status !== 'ok') return;
        const payload = inner.result || {};
        const token = payload.token;
        if (!token) return;

        const link = document.getElementById('download_link');
        link.href = `/files/${token}`;
        link.textContent = `Скачать файл (token: ${token})`;
        link.style.display = 'inline-block';
      } catch (e) {
        console.log('Не удалось вытащить токен из ответа:', e);
      }
    }

    function tryShowDirView(respJson) {
      try {
        if (!respJson || respJson.status !== 'ok') return;
        const inner = respJson.result;
        if (!inner || inner.status !== 'ok') return;
        const payload = inner.result || {};
        const path = payload.path;
        const files = payload.files || [];
        const dirs = payload.dirs || [];

        const view = document.getElementById('dir_view');
        const pathEl = document.getElementById('dir_path');
        const filesEl = document.getElementById('dir_files');
        const dirsEl = document.getElementById('dir_dirs');

        pathEl.textContent = path || '';

        dirsEl.innerHTML = '';
        dirs.forEach(d => {
          const li = document.createElement('li');
          li.textContent = d;
          dirsEl.appendChild(li);
        });

        filesEl.innerHTML = '';
        files.forEach(f => {
          const li = document.createElement('li');
          li.textContent = f;
          filesEl.appendChild(li);
        });

        view.style.display = 'block';
      } catch (e) {
        console.log('Не удалось отрисовать list_dir:', e);
      }
    }

    async function sendCommand() {
      const deviceId = document.getElementById('device_id').value;
      const action = document.getElementById('action').value;
      const params = buildParams(action);

      hideDownloadLink();
      hideDirView();

      const payload = { device_id: deviceId, action: action, params: params };

      try {
        const resp = await fetch('/command', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await resp.json();
        document.getElementById('output').textContent = JSON.stringify(data, null, 2);

        if (action === 'download_file') {
          tryShowDownloadLink(data);
        } else if (action === 'list_dir') {
          tryShowDirView(data);
        }
      } catch (e) {
        document.getElementById('output').textContent = "Ошибка запроса: " + e;
      }
    }

    // init
    onActionChange();
  </script>
</body>
</html>
