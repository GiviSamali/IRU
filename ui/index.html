<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ИРУ v3.2 — Интеллектуальный Режим Управления</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #0f1520;
  --bg-tertiary: #141b2a;
  --bg-hover: #1a2236;
  --bg-input: #111827;
  --border: #1e293b;
  --border-active: #00d4ff33;
  --accent: #00d4ff;
  --accent-dim: #00d4ff80;
  --accent-glow: #00d4ff20;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --success: #22c55e;
  --error: #ef4444;
  --warning: #f59e0b;
  --font: 'JetBrains Mono', monospace;
  --radius: 8px;
  --radius-sm: 4px;
  --radius-lg: 12px;
  --sidebar-w: 260px;
}
html, body {
  height: 100%;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.5;
  overflow: hidden;
}

/* ── AUTH SCREEN ─────────────────────────────── */
.auth-screen {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; background: var(--bg-primary);
}
.auth-box {
  width: 380px; padding: 40px 32px;
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: var(--radius-lg); text-align: center;
}
.auth-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 24px; }
.auth-logo svg { width: 36px; height: 36px; }
.auth-logo-text { font-size: 22px; font-weight: 700; letter-spacing: 3px; color: var(--accent); }
.auth-logo-ver { font-size: 10px; color: var(--text-muted); }
.auth-desc { font-size: 11px; color: var(--text-muted); margin-bottom: 24px; }
.auth-input {
  width: 100%; padding: 10px 14px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text-primary);
  font-family: var(--font); font-size: 12px; outline: none;
  transition: border-color 0.15s;
}
.auth-input:focus { border-color: var(--accent-dim); box-shadow: 0 0 0 2px var(--accent-glow); }
.auth-input::placeholder { color: var(--text-muted); }
.auth-btn {
  width: 100%; margin-top: 14px; padding: 10px;
  background: var(--accent); border: none; border-radius: var(--radius);
  color: var(--bg-primary); font-family: var(--font); font-size: 13px;
  font-weight: 600; cursor: pointer; transition: filter 0.15s;
}
.auth-btn:hover { filter: brightness(1.15); }
.auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.auth-error {
  margin-top: 12px; font-size: 11px; color: var(--error);
  min-height: 16px;
}

/* ── APP LAYOUT ──────────────────────────────── */
.app { display: none; flex-direction: row; height: 100vh; }
.app.active { display: flex; }

/* ── SIDEBAR ─────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--bg-secondary); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  min-height: 48px;
}
.sidebar-logo { display: flex; align-items: center; gap: 8px; }
.sidebar-logo svg { width: 22px; height: 22px; }
.sidebar-logo-text { font-size: 14px; font-weight: 700; letter-spacing: 2px; color: var(--accent); }
.sidebar-logo-ver { font-size: 9px; color: var(--text-muted); letter-spacing: 1px; }

.btn-new-chat {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; background: var(--accent);
  border: none; border-radius: var(--radius); color: var(--bg-primary);
  cursor: pointer; transition: filter 0.15s; flex-shrink: 0;
}
.btn-new-chat:hover { filter: brightness(1.15); }
.btn-new-chat svg { width: 14px; height: 14px; }

.chat-list { flex: 1; overflow-y: auto; padding: 6px 0; }
.chat-list::-webkit-scrollbar { width: 4px; }
.chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.chat-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; cursor: pointer; transition: background 0.1s;
  border-left: 2px solid transparent; position: relative;
}
.chat-item:hover { background: var(--bg-hover); }
.chat-item.active { background: var(--bg-tertiary); border-left-color: var(--accent); }
.chat-item-icon { width: 16px; height: 16px; flex-shrink: 0; color: var(--text-muted); }
.chat-item.active .chat-item-icon { color: var(--accent); }
.chat-item-text {
  flex: 1; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; font-size: 11px; color: var(--text-secondary);
}
.chat-item.active .chat-item-text { color: var(--text-primary); }
.chat-item-delete {
  display: none; width: 20px; height: 20px;
  align-items: center; justify-content: center;
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; border-radius: 3px; flex-shrink: 0;
}
.chat-item:hover .chat-item-delete { display: flex; }
.chat-item-delete:hover { color: var(--error); background: rgba(239,68,68,0.1); }
.chat-item-delete svg { width: 12px; height: 12px; }

.sidebar-empty {
  padding: 20px 14px; text-align: center;
  font-size: 11px; color: var(--text-muted);
}

.sidebar-footer {
  padding: 10px 14px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-user {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text-secondary);
}
.sidebar-user-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--success);
  box-shadow: 0 0 6px var(--success);
}
.btn-logout {
  background: none; border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 4px 8px;
  font-family: var(--font); font-size: 9px; color: var(--text-muted);
  cursor: pointer; transition: all 0.15s;
}
.btn-logout:hover { color: var(--error); border-color: var(--error); }

/* ── MAIN AREA ───────────────────────────────── */
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 48px; min-height: 48px;
  background: var(--bg-secondary); border-bottom: 1px solid var(--border);
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-title {
  font-size: 12px; font-weight: 500; color: var(--text-secondary);
  max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.header-right { display: flex; align-items: center; gap: 8px; }

.device-indicator {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; background: var(--bg-tertiary);
  border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 11px; color: var(--text-secondary); cursor: pointer;
}
.device-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
.device-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }

.btn-icon {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; background: var(--bg-tertiary);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
}
.btn-icon:hover { background: var(--bg-hover); color: var(--accent); border-color: var(--border-active); }
.btn-icon.active { background: var(--accent-glow); color: var(--accent); border-color: var(--accent-dim); }

/* CONTENT */
.content { flex: 1; display: flex; overflow: hidden; position: relative; }

/* CHAT */
.chat-view { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Welcome */
.chat-welcome {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px; opacity: 0.7;
}
.chat-welcome svg { width: 48px; height: 48px; color: var(--accent); opacity: 0.4; }
.chat-welcome h2 { font-size: 16px; font-weight: 600; }
.chat-welcome p { font-size: 11px; color: var(--text-muted); max-width: 380px; text-align: center; }
.hints { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 6px; }
.hint-chip {
  padding: 5px 10px; background: var(--bg-tertiary);
  border: 1px solid var(--border); border-radius: 16px;
  font-size: 10px; color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
}
.hint-chip:hover { border-color: var(--accent-dim); color: var(--accent); background: var(--accent-glow); }

/* Messages */
.msg { max-width: 85%; display: flex; flex-direction: column; gap: 3px; }
.msg.user { align-self: flex-end; }
.msg.assistant { align-self: flex-start; }
.msg-role {
  font-size: 9px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-muted); padding: 0 4px;
}
.msg.user .msg-role { color: var(--accent-dim); text-align: right; }
.msg-body {
  padding: 8px 12px; border-radius: var(--radius-lg);
  line-height: 1.5; white-space: pre-wrap; word-break: break-word; font-size: 12px;
}
.msg.user .msg-body {
  background: linear-gradient(135deg, #003d4d, #002a3a);
  border: 1px solid var(--accent-dim); border-bottom-right-radius: var(--radius-sm);
}
.msg.assistant .msg-body {
  background: var(--bg-tertiary); border: 1px solid var(--border);
  border-bottom-left-radius: var(--radius-sm);
}
.msg-body a {
  color: var(--accent); text-decoration: none; border-bottom: 1px dashed var(--accent-dim);
}
.msg-body a:hover { border-bottom-style: solid; }

/* Compact command log */
.cmd-log { margin-top: 6px; }
.cmd-entry {
  margin-bottom: 4px; border-left: 2px solid var(--border);
  padding-left: 8px; cursor: pointer;
}
.cmd-entry:hover { border-left-color: var(--accent-dim); }
.cmd-summary {
  display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-muted);
}
.cmd-summary .cmd-icon { font-size: 8px; transition: transform 0.15s; }
.cmd-entry.open .cmd-icon { transform: rotate(90deg); }
.cmd-summary .cmd-text {
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--accent-dim);
}
.cmd-summary .cmd-device {
  font-size: 9px; color: var(--text-muted); background: var(--bg-primary);
  padding: 1px 5px; border-radius: 3px;
}
.cmd-summary .cmd-status { font-size: 9px; }
.cmd-status.ok { color: var(--success); }
.cmd-status.err { color: var(--error); }
.cmd-details {
  display: none; margin-top: 4px; font-size: 11px;
  background: var(--bg-primary); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 6px 8px;
  max-height: 100px; overflow-y: auto; color: var(--text-secondary);
  white-space: pre-wrap; word-break: break-all;
}
.cmd-entry.open .cmd-details { display: block; }

/* Typing */
.typing {
  align-self: flex-start; display: flex; gap: 4px;
  padding: 10px 14px; background: var(--bg-tertiary);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  border-bottom-left-radius: var(--radius-sm);
}
.typing span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--text-muted); animation: tdot 1.4s infinite ease-in-out both;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes tdot {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* INPUT */
.chat-input-area { padding: 10px 16px 14px; background: var(--bg-secondary); border-top: 1px solid var(--border); }
.chat-input-wrap {
  display: flex; align-items: flex-end; gap: 8px;
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 4px 4px 4px 12px;
  transition: border-color 0.15s;
}
.chat-input-wrap:focus-within { border-color: var(--accent-dim); box-shadow: 0 0 0 2px var(--accent-glow); }
.chat-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text-primary); font-family: var(--font);
  font-size: 12px; line-height: 1.5; padding: 7px 0;
  resize: none; max-height: 100px; min-height: 18px;
}
.chat-input::placeholder { color: var(--text-muted); }
.btn-send {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; background: var(--accent);
  border: none; border-radius: var(--radius); color: var(--bg-primary);
  cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.btn-send:hover { filter: brightness(1.15); }
.btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

/* EXPLORER PANEL */
.explorer-panel {
  width: 0; overflow: hidden; border-left: 1px solid var(--border);
  background: var(--bg-secondary); transition: width 0.25s ease;
  display: flex; flex-direction: column;
}
.explorer-panel.open { width: 360px; }

.explorer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-bottom: 1px solid var(--border); min-height: 44px;
}
.explorer-header h3 {
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text-secondary);
}

.explorer-nav {
  display: flex; gap: 4px; padding: 6px 14px; border-bottom: 1px solid var(--border);
}
.explorer-nav .btn-icon { width: 28px; height: 28px; }

.explorer-path {
  display: flex; align-items: center; gap: 3px;
  padding: 6px 14px; background: var(--bg-primary);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; white-space: nowrap; font-size: 10px; color: var(--text-muted);
}
.explorer-path::-webkit-scrollbar { height: 2px; }
.explorer-path::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.path-segment { cursor: pointer; color: var(--text-secondary); transition: color 0.15s; flex-shrink: 0; }
.path-segment:hover { color: var(--accent); }
.path-sep { color: var(--text-muted); flex-shrink: 0; }

.explorer-list { flex: 1; overflow-y: auto; padding: 2px 0; }
.explorer-list::-webkit-scrollbar { width: 5px; }
.explorer-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.explorer-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; cursor: pointer; transition: background 0.1s;
  border-left: 2px solid transparent; position: relative;
}
.explorer-item:hover { background: var(--bg-hover); border-left-color: var(--accent-dim); }
.explorer-item .icon { width: 16px; height: 16px; flex-shrink: 0; color: var(--text-muted); }
.explorer-item.dir .icon { color: var(--accent-dim); }
.explorer-item .name {
  flex: 1; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; font-size: 11px;
}
.explorer-item .size { font-size: 9px; color: var(--text-muted); flex-shrink: 0; }

.explorer-item .file-actions {
  display: none; gap: 4px; flex-shrink: 0;
}
.explorer-item:hover .file-actions { display: flex; }
.file-action-btn {
  width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
  background: var(--bg-primary); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text-muted); cursor: pointer; transition: all 0.1s;
}
.file-action-btn:hover { color: var(--accent); border-color: var(--accent-dim); }
.file-action-btn svg { width: 12px; height: 12px; }

.explorer-empty { padding: 30px 14px; text-align: center; color: var(--text-muted); font-size: 11px; }

/* DEVICE DROPDOWN */
.device-select { position: relative; }
.device-dropdown {
  position: absolute; top: calc(100% + 4px); right: 0;
  min-width: 200px; background: var(--bg-tertiary);
  border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 200; display: none; overflow: hidden;
}
.device-dropdown.show { display: block; }
.device-dropdown-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; cursor: pointer; font-size: 11px;
  color: var(--text-secondary); transition: background 0.1s;
}
.device-dropdown-item:hover { background: var(--bg-hover); }
.device-dropdown-item.selected { color: var(--accent); }
.device-dropdown-item .device-os { font-size: 9px; color: var(--text-muted); }
.device-dropdown-empty { padding: 14px; text-align: center; font-size: 11px; color: var(--text-muted); }

/* TOAST */
.toast {
  position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--bg-tertiary); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 16px; font-size: 11px;
  color: var(--text-secondary); z-index: 300; opacity: 0;
  pointer-events: none; transition: all 0.25s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
.toast.error { border-color: var(--error); color: var(--error); }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .explorer-panel.open { width: 100%; position: absolute; right: 0; top: 0; bottom: 0; z-index: 50; }
}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">
      <svg viewBox="0 0 32 32" fill="none">
        <rect x="2" y="2" width="28" height="28" rx="6" stroke="var(--accent)" stroke-width="1.5"/>
        <circle cx="16" cy="13" r="5" stroke="var(--accent)" stroke-width="1.5"/>
        <path d="M10 24 C10 20 22 20 22 24" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="16" cy="13" r="1.5" fill="var(--accent)"/>
      </svg>
      <div>
        <div class="auth-logo-text">ИРУ</div>
        <div class="auth-logo-ver">v3.2</div>
      </div>
    </div>
    <div class="auth-desc">Введите токен доступа для входа в систему</div>
    <input type="text" class="auth-input" id="authInput" placeholder="Вставьте токен..."
      onkeydown="if(event.key==='Enter')doAuth()" autocomplete="off" spellcheck="false">
    <button class="auth-btn" id="authBtn" onclick="doAuth()">Войти</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appRoot">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg viewBox="0 0 32 32" fill="none">
          <rect x="2" y="2" width="28" height="28" rx="6" stroke="var(--accent)" stroke-width="1.5"/>
          <circle cx="16" cy="13" r="5" stroke="var(--accent)" stroke-width="1.5"/>
          <path d="M10 24 C10 20 22 20 22 24" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="16" cy="13" r="1.5" fill="var(--accent)"/>
        </svg>
        <div>
          <div class="sidebar-logo-text">ИРУ</div>
          <div class="sidebar-logo-ver">v3.2</div>
        </div>
      </div>
      <button class="btn-new-chat" onclick="createNewChat()" title="Новый чат">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <div class="chat-list" id="chatList">
      <div class="sidebar-empty">Нет чатов</div>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <span class="sidebar-user-dot"></span>
        <span id="userName">—</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Выйти</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-area">
    <header class="header">
      <div class="header-left">
        <div class="header-title" id="headerTitle">Новый чат</div>
      </div>
      <div class="header-right">
        <div class="device-select">
          <div class="device-indicator" id="deviceBtn" onclick="toggleDeviceDropdown()">
            <span class="device-dot" id="deviceDot"></span>
            <span id="deviceLabel">Нет устройств</span>
            <svg width="8" height="8" viewBox="0 0 10 10" fill="currentColor"><path d="M2 3.5L5 6.5L8 3.5"/></svg>
          </div>
          <div class="device-dropdown" id="deviceDropdown">
            <div class="device-dropdown-empty" id="deviceListEmpty">Ожидание...</div>
            <div id="deviceList"></div>
          </div>
        </div>
        <button class="btn-icon" id="explorerToggle" onclick="toggleExplorer()" title="Проводник">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        </button>
      </div>
    </header>

    <div class="content">
      <div class="chat-view">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <div class="chat-input-wrap">
            <textarea class="chat-input" id="chatInput" placeholder="Опиши задачу..." rows="1"
              onkeydown="handleInputKey(event)" oninput="autoGrow(this)"></textarea>
            <button class="btn-send" id="btnSend" onclick="sendMessage()" title="Отправить">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="explorer-panel" id="explorerPanel">
        <div class="explorer-header">
          <h3>Проводник</h3>
          <button class="btn-icon" onclick="toggleExplorer()" title="Закрыть" style="width:24px;height:24px">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="explorer-nav">
          <button class="btn-icon" onclick="explorerBack()" title="Назад" style="width:26px;height:26px">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </button>
          <button class="btn-icon" onclick="explorerUp()" title="Вверх" style="width:26px;height:26px">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          </button>
          <button class="btn-icon" onclick="explorerRefresh()" title="Обновить" style="width:26px;height:26px">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          </button>
        </div>
        <div class="explorer-path" id="explorerPath"></div>
        <div class="explorer-list" id="explorerList">
          <div class="explorer-empty">Подключите устройство</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ────────────────────────────────────────────
const state = {
  user: null,        // {id, name, token}
  chats: [],         // [{id, title, created_at, updated_at}]
  currentChatId: null,
  messages: [],      // messages of current chat (from server)
  devices: {},
  selectedDevice: null,
  explorerOpen: false,
  explorerPath: null,
  explorerHistory: [],
  isLoading: false,
};

const API = window.location.origin;

function authHeaders() {
  return { 'Content-Type': 'application/json', 'X-Token': state.user?.token || '' };
}

// ── AUTH ─────────────────────────────────────────────
async function doAuth() {
  const input = document.getElementById('authInput');
  const token = input.value.trim();
  if (!token) return;

  document.getElementById('authBtn').disabled = true;
  document.getElementById('authError').textContent = '';

  try {
    const r = await fetch(`${API}/api/auth`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
    const data = await r.json();
    if (data.status === 'ok') {
      state.user = data.user;
      localStorage.setItem('iru_token', token);
      showApp();
    } else {
      document.getElementById('authError').textContent = data.error || 'Ошибка авторизации';
    }
  } catch (e) {
    document.getElementById('authError').textContent = 'Ошибка сети: ' + e.message;
  }
  document.getElementById('authBtn').disabled = false;
}

function doLogout() {
  localStorage.removeItem('iru_token');
  state.user = null;
  state.chats = [];
  state.currentChatId = null;
  state.messages = [];
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appRoot').classList.remove('active');
}

async function tryAutoLogin() {
  const token = localStorage.getItem('iru_token');
  if (!token) return;
  try {
    const r = await fetch(`${API}/api/auth`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
    const data = await r.json();
    if (data.status === 'ok') {
      state.user = data.user;
      showApp();
    }
  } catch {}
}

function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appRoot').classList.add('active');
  document.getElementById('userName').textContent = state.user.name;
  loadChats();
  fetchDevices();
  setInterval(fetchDevices, 5000);
}

// ── CHATS ────────────────────────────────────────────
async function loadChats() {
  try {
    const r = await fetch(`${API}/api/chats`, { headers: authHeaders() });
    const data = await r.json();
    state.chats = data.chats || [];
    renderChatList();

    // Если есть чаты и нет активного — открыть первый
    if (state.chats.length > 0 && !state.currentChatId) {
      openChat(state.chats[0].id);
    } else if (state.chats.length === 0) {
      state.currentChatId = null;
      state.messages = [];
      renderMessages();
      document.getElementById('headerTitle').textContent = 'Новый чат';
    }
  } catch (e) { console.error('loadChats:', e); }
}

async function createNewChat() {
  try {
    const r = await fetch(`${API}/api/chats`, {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ title: '' }),
    });
    const data = await r.json();
    if (data.status === 'ok') {
      await loadChats();
      openChat(data.chat.id);
    }
  } catch (e) { showToast('Ошибка: ' + e.message, true); }
}

async function openChat(chatId) {
  state.currentChatId = chatId;
  renderChatList();

  const chat = state.chats.find(c => c.id === chatId);
  document.getElementById('headerTitle').textContent = chat ? chat.title : 'Чат';

  // Загрузить сообщения
  try {
    const r = await fetch(`${API}/api/chats/${chatId}/messages`, { headers: authHeaders() });
    const data = await r.json();
    state.messages = data.messages || [];
    renderMessages();
  } catch (e) {
    state.messages = [];
    renderMessages();
  }
}

async function deleteChat(chatId, event) {
  event.stopPropagation();
  try {
    await fetch(`${API}/api/chats/${chatId}`, { method: 'DELETE', headers: authHeaders() });
    if (state.currentChatId === chatId) {
      state.currentChatId = null;
      state.messages = [];
      renderMessages();
    }
    await loadChats();
  } catch (e) { showToast('Ошибка: ' + e.message, true); }
}

function renderChatList() {
  const list = document.getElementById('chatList');
  if (state.chats.length === 0) {
    list.innerHTML = '<div class="sidebar-empty">Нет чатов</div>';
    return;
  }
  list.innerHTML = state.chats.map(c => {
    const active = c.id === state.currentChatId ? ' active' : '';
    return `<div class="chat-item${active}" onclick="openChat(${c.id})">
      <svg class="chat-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span class="chat-item-text">${escapeHTML(c.title)}</span>
      <button class="chat-item-delete" onclick="deleteChat(${c.id}, event)" title="Удалить">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;
  }).join('');
}

// ── DEVICES ──────────────────────────────────────────
async function fetchDevices() {
  if (!state.user) return;
  try {
    const r = await fetch(`${API}/api/devices`, { headers: authHeaders() });
    const data = await r.json();
    state.devices = data.devices || {};
    renderDevices();
  } catch (e) {}
}

function renderDevices() {
  const ids = Object.keys(state.devices);
  const list = document.getElementById('deviceList');
  const empty = document.getElementById('deviceListEmpty');
  const dot = document.getElementById('deviceDot');
  const label = document.getElementById('deviceLabel');

  if (ids.length === 0) {
    empty.style.display = 'block';
    list.innerHTML = '';
    dot.className = 'device-dot';
    label.textContent = 'Нет устройств';
    state.selectedDevice = null;
    return;
  }
  empty.style.display = 'none';
  if (!state.selectedDevice || !state.devices[state.selectedDevice]) {
    state.selectedDevice = ids[0];
  }
  const dev = state.devices[state.selectedDevice];
  dot.className = 'device-dot online';
  label.textContent = dev.info?.hostname || state.selectedDevice;
  list.innerHTML = ids.map(id => {
    const d = state.devices[id];
    const sel = id === state.selectedDevice ? ' selected' : '';
    const info = d.info || {};
    return `<div class="device-dropdown-item${sel}" onclick="selectDevice('${id}')">
      <span class="device-dot online"></span>
      <div><div>${info.hostname || id}</div><div class="device-os">${info.os || '?'} — ${id}</div></div>
    </div>`;
  }).join('');
}

function selectDevice(id) {
  state.selectedDevice = id;
  renderDevices();
  closeDeviceDropdown();
  if (state.explorerOpen) explorerNavigate(state.explorerPath);
}
function toggleDeviceDropdown() {
  document.getElementById('deviceDropdown').classList.toggle('show');
  fetchDevices();
}
function closeDeviceDropdown() { document.getElementById('deviceDropdown').classList.remove('show'); }
document.addEventListener('click', e => { if (!e.target.closest('.device-select')) closeDeviceDropdown(); });

// ── CHAT MESSAGES ────────────────────────────────────
function renderMessages() {
  const container = document.getElementById('chatMessages');

  if (state.messages.length === 0) {
    container.innerHTML = `
      <div class="chat-welcome">
        <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="4" y="4" width="56" height="56" rx="12"/>
          <circle cx="32" cy="26" r="10"/>
          <path d="M18 50 C18 40 46 40 46 50" stroke-linecap="round"/>
        </svg>
        <h2>ИРУ — Интеллектуальный Режим Управления</h2>
        <p>Опиши задачу на естественном языке — ИРУ выполнит на твоём устройстве.</p>
        <div class="hints">
          <div class="hint-chip" onclick="sendHint(this)">Открой браузер</div>
          <div class="hint-chip" onclick="sendHint(this)">Покажи IP адрес</div>
          <div class="hint-chip" onclick="sendHint(this)">Свободное место на диске</div>
          <div class="hint-chip" onclick="sendHint(this)">Запущенные процессы</div>
        </div>
      </div>`;
    return;
  }

  let html = '';
  for (const m of state.messages) {
    const roleLabel = m.role === 'user' ? 'вы' : 'иру';
    let bodyHTML = linkify(escapeHTML(m.content || m.text || ''));

    const commands = m.commands;
    if (commands && commands.length > 0) {
      bodyHTML += '<div class="cmd-log">';
      for (let i = 0; i < commands.length; i++) {
        const c = commands[i];
        const stdout = c.result?.stdout || '';
        const stderr = c.result?.stderr || '';
        const url = c.result?.url || '';
        const errMsg = c.result?.error || '';
        const output = stdout || stderr || errMsg || '(нет вывода)';
        const isOk = !errMsg && (c.result?.returncode === 0 || c.result?.returncode == null);
        const statusCls = isOk ? 'ok' : 'err';
        const statusTxt = isOk ? '\u2713' : '\u2717';
        const deviceTag = c.device_id ? `<span class="cmd-device">${escapeHTML(c.device_id)}</span>` : '';
        const cmdText = c.command.startsWith('[') ? c.command : escapeHTML(c.command);
        bodyHTML += `
          <div class="cmd-entry" onclick="this.classList.toggle('open')">
            <div class="cmd-summary">
              <span class="cmd-icon">\u25b8</span>
              <span class="cmd-text">${cmdText}</span>
              ${deviceTag}
              <span class="cmd-status ${statusCls}">${statusTxt}</span>
            </div>
            <div class="cmd-details">${escapeHTML(output)}</div>
          </div>`;
      }
      bodyHTML += '</div>';
    }
    html += `<div class="msg ${m.role}"><div class="msg-role">${roleLabel}</div><div class="msg-body">${bodyHTML}</div></div>`;
  }

  if (state.isLoading) {
    html += '<div class="typing"><span></span><span></span><span></span></div>';
  }
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || state.isLoading) return;
  if (!state.selectedDevice) { showToast('Нет подключённых устройств', true); return; }

  input.value = '';
  autoGrow(input);

  // Добавить сообщение в UI сразу
  state.messages.push({ role: 'user', content: text });
  state.isLoading = true;
  renderMessages();

  try {
    const r = await fetch(`${API}/nl_command`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({
        device_id: state.selectedDevice,
        message: text,
        chat_id: state.currentChatId,
      }),
    });
    const data = await r.json();

    // Обновить chat_id (мог быть создан автоматически)
    if (data.chat_id && data.chat_id !== state.currentChatId) {
      state.currentChatId = data.chat_id;
      await loadChats();
    }

    if (data.status === 'ok') {
      state.messages.push({
        role: 'assistant',
        content: data.answer || 'Готово.',
        commands: data.commands,
      });
    } else {
      state.messages.push({
        role: 'assistant',
        content: `Ошибка: ${data.error || 'Неизвестная ошибка'}`,
      });
    }
  } catch (e) {
    state.messages.push({ role: 'assistant', content: `Ошибка сети: ${e.message}` });
  }
  state.isLoading = false;
  renderMessages();

  // Обновить список чатов (title мог измениться)
  loadChats();
}

function sendHint(el) {
  document.getElementById('chatInput').value = el.textContent;
  sendMessage();
}
function handleInputKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoGrow(el) { el.style.height = '18px'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }

// ── EXPLORER ─────────────────────────────────────────
function toggleExplorer() {
  state.explorerOpen = !state.explorerOpen;
  document.getElementById('explorerPanel').classList.toggle('open', state.explorerOpen);
  document.getElementById('explorerToggle').classList.toggle('active', state.explorerOpen);
  if (state.explorerOpen && state.selectedDevice) explorerNavigate(state.explorerPath);
}

async function explorerNavigate(path) {
  if (!state.selectedDevice) {
    document.getElementById('explorerList').innerHTML = '<div class="explorer-empty">Нет устройства</div>';
    return;
  }
  try {
    const params = path ? { path } : {};
    const r = await fetch(`${API}/command`, {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ device_id: state.selectedDevice, action: 'list_dir', params }),
    });
    const data = await r.json();
    if (data.status === 'error') {
      document.getElementById('explorerList').innerHTML = `<div class="explorer-empty">${escapeHTML(data.error)}</div>`;
      return;
    }
    const result = data.result;
    if (result.error) {
      document.getElementById('explorerList').innerHTML = `<div class="explorer-empty">${escapeHTML(result.error)}</div>`;
      return;
    }
    if (state.explorerPath && state.explorerPath !== result.path) {
      state.explorerHistory.push(state.explorerPath);
    }
    state.explorerPath = result.path;
    renderExplorerPath(result.path);
    renderExplorerList(result.dirs, result.files);
  } catch (e) {
    document.getElementById('explorerList').innerHTML = `<div class="explorer-empty">Ошибка: ${e.message}</div>`;
  }
}

function renderExplorerPath(pathStr) {
  const container = document.getElementById('explorerPath');
  const sep = pathStr.includes('\\') ? '\\' : '/';
  const parts = pathStr.split(sep).filter(Boolean);
  let html = '', accumulated = pathStr.startsWith('/') ? '/' : '';
  for (let i = 0; i < parts.length; i++) {
    accumulated += parts[i] + sep;
    const target = accumulated;
    html += `<span class="path-segment" onclick="explorerNavigate('${escapeAttr(target)}')">${escapeHTML(parts[i])}</span>`;
    if (i < parts.length - 1) html += '<span class="path-sep">\u203a</span>';
  }
  container.innerHTML = html;
}

function renderExplorerList(dirs, files) {
  const container = document.getElementById('explorerList');
  if ((!dirs || !dirs.length) && (!files || !files.length)) {
    container.innerHTML = '<div class="explorer-empty">Пустая директория</div>';
    return;
  }
  let html = '';
  for (const d of (dirs || [])) {
    html += `<div class="explorer-item dir" onclick="explorerNavigate('${escapeAttr(d.path)}')">
      <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
      <span class="name">${escapeHTML(d.name)}</span>
      <div class="file-actions">
        <div class="file-action-btn" onclick="event.stopPropagation(); openOnDevice('${escapeAttr(d.path)}')" title="Открыть на ПК">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </div>
      </div>
    </div>`;
  }
  for (const f of (files || [])) {
    const size = formatSize(f.size);
    html += `<div class="explorer-item file">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
      <span class="name">${escapeHTML(f.name)}</span>
      <span class="size">${size}</span>
      <div class="file-actions">
        <div class="file-action-btn" onclick="event.stopPropagation(); openOnDevice('${escapeAttr(f.path)}')" title="Открыть на ПК">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </div>
        <div class="file-action-btn" onclick="event.stopPropagation(); downloadFile('${escapeAttr(f.path)}')" title="Скачать">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </div>
      </div>
    </div>`;
  }
  container.innerHTML = html;
}

function explorerBack() {
  if (state.explorerHistory.length > 0) {
    const prev = state.explorerHistory.pop();
    state.explorerPath = null;
    explorerNavigate(prev);
  }
}
function explorerUp() {
  if (!state.explorerPath) return;
  const sep = state.explorerPath.includes('\\') ? '\\' : '/';
  const parts = state.explorerPath.split(sep).filter(Boolean);
  if (parts.length <= 1) return;
  parts.pop();
  const parent = (state.explorerPath.startsWith('/') ? '/' : '') + parts.join(sep) + sep;
  explorerNavigate(parent);
}
function explorerRefresh() { explorerNavigate(state.explorerPath); }

// ── FILE ACTIONS ─────────────────────────────────────
async function openOnDevice(filePath) {
  if (!state.selectedDevice) return;
  try {
    await fetch(`${API}/command`, {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({
        device_id: state.selectedDevice,
        action: 'execute_cmd',
        params: { command: `Start-Process "${filePath}"`, timeout: 10 }
      }),
    });
    showToast('Открываю...');
  } catch (e) { showToast('Ошибка: ' + e.message, true); }
}

async function downloadFile(filePath) {
  if (!state.selectedDevice) return;
  showToast('Подготовка к скачиванию...');
  try {
    const r = await fetch(`${API}/api/download_request`, {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ device_id: state.selectedDevice, file_path: filePath }),
    });
    const data = await r.json();
    if (data.status === 'ok' && data.url) {
      const a = document.createElement('a');
      a.href = data.url;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      a.remove();
    } else {
      showToast(data.error || 'Ошибка', true);
    }
  } catch (e) { showToast('Ошибка: ' + e.message, true); }
}

// ── UTILS ────────────────────────────────────────────
function escapeHTML(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function escapeAttr(s) { return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
function formatSize(b) {
  if (b == null) return '';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(1) + ' GB';
}
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { t.className = 'toast'; }, 3000);
}
function linkify(text) {
  return text.replace(/(\/api\/download\/[a-f0-9-]+)/g, '<a href="$1" target="_blank">\ud83d\udce5 Скачать файл</a>');
}

// ── INIT ─────────────────────────────────────────────
tryAutoLogin();
</script>
</body>
</html>
